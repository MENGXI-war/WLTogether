spring:
  datasource:
    url: jdbc:sqlite:${app.data-dir:./data}/wl.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  flyway:
    locations: classpath:db/migration/sqlite

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

# Dev default admin — change in production via ADMIN_INIT_PASSWORD env var
app:
  admin:
    init-password: ${ADMIN_INIT_PASSWORD:admin123}
  logs:
    dir: ./logs
