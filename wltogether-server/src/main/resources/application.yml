server:
  port: 8080
  address: 127.0.0.1

spring:
  profiles:
    active: sqlite

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  mail:
    host: smtp.163.com
    port: 465
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

# JWT
app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:WLTogether-Access-Secret-AtLeast256Bits-ChangeInProduction!}
    refresh-secret: ${JWT_REFRESH_SECRET:WLTogether-Refresh-Secret-AtLeast256Bits-ChangeInProduction!}
    access-token-expiration: 7200       # 2 hours
    refresh-token-expiration: 2592000   # 30 days
    issuer: wltogether

# Resilience4j Rate Limiting
resilience4j:
  ratelimiter:
    instances:
      login:
        limit-for-period: 5
        limit-refresh-period: 60s
        timeout-duration: 0
      register:
        limit-for-period: 3
        limit-refresh-period: 60s
        timeout-duration: 0
      verify-code:
        limit-for-period: 3
        limit-refresh-period: 60s
        timeout-duration: 0
      api:
        limit-for-period: 60
        limit-refresh-period: 60s
        timeout-duration: 0
      admin:
        limit-for-period: 30
        limit-refresh-period: 60s
        timeout-duration: 0

# Upload limits
upload:
  avatar:
    max-size: 2097152              # 2MB
    allowed-types: image/png,image/jpeg,image/webp
    target-width: 256
    target-height: 256

# Session limits
session:
  max-participants: 20
  max-concurrent-per-user: 5

# Storage
storage:
  avatar-dir: ${app.data-dir:./data}/avatars
  image-dir: ${app.data-dir:./data}/images
  image-max-size: 10485760
  max-per-group-mb: 1024
  message-retention-days: 7
  temp-dir: ${app.data-dir:./data}/temp

logging:
  file:
    name: ./logs/wltogether.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      file-name-pattern: ./logs/wltogether-%d{yyyy-MM-dd}.%i.log
  level:
    root: WARN
    com.wltogether: INFO
